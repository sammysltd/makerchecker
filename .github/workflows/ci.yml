name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 15
    env:
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run ci
      # OpenAPI drift guard: regenerate the spec from the live server routes and
      # fail if the committed packages/sdk/openapi.json no longer matches. Keeps
      # the generated SDK in sync with the server. Requires the build from `ci`.
      - name: Check OpenAPI spec is up to date
        run: |
          node packages/server/scripts/emit-openapi.mjs
          git diff --exit-code packages/sdk/openapi.json

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # gitleaks scans the full git history; without depth 0 only the
          # latest commit is fetched and a secret in an earlier commit slips by.
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      # SCA (Layer 2): fail the build on any high/critical advisory in the
      # production dependency tree. Dev-only advisories do not gate releases.
      # Unavoidable advisories (none today) would be documented and allowlisted
      # via pnpm.auditConfig.ignoreCves in package.json so the gate stays real.
      - name: Dependency audit (pnpm audit)
        run: corepack pnpm audit --prod --audit-level high
      # Secret scan (Layer 5): scan the repo for committed secrets and fail on a
      # finding. Allowlist for known fixtures/placeholders lives in .gitleaks.toml.
      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v3
        env:
          GITLEAKS_CONFIG: .gitleaks.toml
          # gitleaks-action@v3 requires a token to scan pull_request events
          # (without it, every PR fails the secret scan). The auto-provided
          # token is read-only on Dependabot PRs, which is all the scan needs.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build and boot the stack
        # `up --build` also validates the Dockerfile builds. Booting it is what
        # catches runtime-only failures the image build cannot — e.g. a runtime
        # dependency pruned by `pnpm deploy --prod`, which surfaces as
        # ERR_MODULE_NOT_FOUND only when node actually starts.
        run: docker compose up -d --build
      - name: Wait for the server to become healthy
        run: |
          for i in $(seq 1 45); do
            if curl -fsS http://localhost:3000/healthz >/dev/null 2>&1; then
              echo "server is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "::error::server did not pass /healthz within 90s"
          exit 1
      - name: Server logs on failure
        if: failure()
        run: docker compose logs server
      - name: Tear down
        if: always()
        run: docker compose down -v

  # Image CVE scan (Layer 2, base-image side): pnpm audit at `security` only sees
  # the npm dependency tree. The shipped artifact also carries Alpine OS packages
  # from node:22-alpine — trivy is what catches a high/critical CVE in those that
  # the npm audit cannot. ignore-unfixed keeps the gate honest: node:22-alpine
  # routinely ships base CVEs with no upstream fix, and gating on those would pin
  # the build permanently red and block every unrelated PR until a base bump that
  # may not exist. So this fails ONLY on a HIGH/CRITICAL that actually has a fix.
  image-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Each job runs on a fresh runner with no shared local image, and the
      # `docker` job above tears its image down. Build our own with an explicit
      # tag (context is the repo root: the Dockerfile COPYs package manifests,
      # the workspace packages, and examples/ relative to it) so trivy has a
      # predictable reference instead of the compose-derived name.
      - name: Build server image
        run: docker build -t makerchecker-server:ci -f packages/server/Dockerfile .
      - name: Trivy image scan (gate on fixable HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: makerchecker-server:ci
          scan-type: image
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          vuln-type: os,library

  # Helm chart verification (self-verifying, no cluster needed): helm lint catches
  # a malformed chart; helm template forces a full render so a bad template or a
  # broken values reference fails here, on the PR's own CI. Each example value set
  # exercises a different path (external DB, bundled Postgres, single-role), so a
  # regression in any toggle surfaces without a kind cluster.
  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: azure/setup-helm@v4
        with:
          version: v4.2.1
      - name: helm lint
        run: |
          for f in external-db bundled-eval single-role; do
            helm lint --strict deploy/helm/makerchecker -f deploy/helm/examples/values-$f.yaml
          done
      - name: helm template (render must succeed)
        run: |
          for f in external-db bundled-eval single-role; do
            helm template makerchecker deploy/helm/makerchecker -f deploy/helm/examples/values-$f.yaml > /dev/null
          done

  # SBOM (evidence, non-gating): emit a machine-readable CycloneDX bill of
  # materials a self-hosting regulated buyer can ingest. This generates and
  # uploads evidence — it must never fail the PR, so there is no exit-code here
  # (sbom-action does not fail on findings). syft reads both the OS and JS layers
  # of the actual shipped image, plus the full source dependency tree.
  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Build the image so the SBOM reflects exactly what ships (pruned prod
      # node_modules + Alpine OS packages), not just what is in the repo.
      - name: Build server image
        run: docker build -t makerchecker-server:ci -f packages/server/Dockerfile .
      # upload-artifact is disabled on each sbom-action step so the action does
      # not auto-upload twice under the same name (upload-artifact@v4 errors on a
      # duplicate name); a single consolidated upload below controls the name.
      - name: Generate CycloneDX SBOM (image)
        uses: anchore/sbom-action@v0
        with:
          image: makerchecker-server:ci
          format: cyclonedx-json
          output-file: sbom-image.cdx.json
          upload-artifact: false
      - name: Generate CycloneDX SBOM (source tree)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom-source.cdx.json
          upload-artifact: false
      # if-no-files-found: error so a silently-empty SBOM (e.g. a bad output-file
      # path) fails the job loudly instead of uploading nothing.
      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: sbom-*.cdx.json
          if-no-files-found: error

  # The Python SDK is outside the pnpm/turbo workspace, so it gets its own lane:
  # lint (ruff), strict types (mypy), and tests (pytest, no server needed).
  python-sdk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/sdk-python
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
      # Install from the committed uv.lock; --frozen fails if the lock is stale.
      - run: uv sync --extra dev --frozen
      - run: uv run ruff check .
      - run: uv run mypy
      - run: uv run pytest -q
